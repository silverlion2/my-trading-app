name: 自动更新期权雷达数据

on:
  schedule:
    # 每天 UTC 11:00 运行 (对应美东时间早晨 6:00 / 夏令时早晨 7:00)
    # 完美避开深夜的 OCC 结算延迟，确保拿到 100% 完整的 T-1 期权链
    - cron: '0 11 * * 2-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy requests

      - name: Run Python script
        env:
          MARKETDATA_TOKEN: ${{ secrets.MARKETDATA_TOKEN }}
        run: |
          if [ -f "data_pipeline.py" ]; then
            python data_pipeline.py
          elif [ -f "options-radar/data_pipeline.py" ]; then
            cd options-radar
            python data_pipeline.py
          else
            echo "找不到 data_pipeline.py 文件！"
            exit 1
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          if [[ -n $(git status --porcelain) ]]; then
            git commit -m "Auto-update: Daily Options Data (Morning EOD Batch)"
            git push
            echo "✅ 早晨 EOD 数据更新成功并推送到仓库！"
          else
            echo "⏭️ 数据没有变化，跳过提交。"
          fi