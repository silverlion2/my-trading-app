name: 自动更新期权雷达数据

on:
  # 设置定时任务 (Cron 语法)
  schedule:
    # 每天 UTC 时间 21:30 运行 (大约是美东时间下午 4:30 或 5:30，根据夏令时变化)
    - cron: '30 21 * * 1-5' # 周一到周五运行
  
  # 允许你随时在 GitHub 网页上手动点击运行
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 云端服务器

    steps:
      # 1. 把你的代码库下载到云端服务器
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 在云端服务器上安装 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装我们脚本需要的依赖库
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy scipy

      # 4. 运行你的 Python 脚本 (假设你的脚本叫 data_pipeline.py，放在项目根目录)
      - name: Run Python script
        run: python data_pipeline.py

      # 5. 将生成的 JSON 文件移动到前端能读到的 public 文件夹
      - name: Move JSON to public folder
        run: |
          mkdir -p public
          mv dashboard_data.json public/dashboard_data.json

      # 6. 将更新后的数据提交并推送到 GitHub (这会自动触发 Vercel 重新部署网站)
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/dashboard_data.json
          # 如果文件有变化才提交
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新: 每日期权数据"
          git push
```

### 你需要做的最后一步：

1. 把你之前保存的那个 Python 脚本文件（`data_pipeline.py`），直接放到你 React 项目的**最外层根目录**里（和 `package.json` 挨着）。
2. 在终端里，把这些新文件推送到 GitHub：

```bash
git add .
git commit -m "添加自动更新数据的云端机器人"
git push