name: 自动更新期权雷达数据

on:
  schedule:
    # 每天 UTC 06:00 运行 (约美东时间凌晨 1:00 或 2:00，夏令时差异)
    # 运行日期为周二到周六 (对应抓取周一到周五的收盘结算数据)
    - cron: '0 6 * * 2-6'
  workflow_dispatch: # 依然保留手动触发按钮

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy requests

      - name: Run Python script
        # 🔑 从 GitHub Secrets 中安全注入 MarketData 的 API 密钥
        env:
          MARKETDATA_TOKEN: ${{ secrets.MARKETDATA_TOKEN }}
        run: |
          if [ -f "data_pipeline.py" ]; then
            python data_pipeline.py
          elif [ -f "options-radar/data_pipeline.py" ]; then
            cd options-radar
            python data_pipeline.py
          else
            echo "找不到 data_pipeline.py 文件！"
            exit 1
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          if [[ -n $(git status --porcelain) ]]; then
            git commit -m "Auto-update: Daily Options Data (Midnight EOD Batch)"
            git push
            echo "✅ 凌晨 EOD 数据更新成功并推送到仓库！"
          else
            echo "⏭️ 数据没有变化，跳过提交。"
          fi